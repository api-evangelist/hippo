aid: hippo
name: Hippo
description: >-
  Hippo is a digital home insurance provider operating as Hippo Insurance
  Services, a subsidiary of Hippo Holdings Inc. (NYSE: HIPO). Headquartered
  in California and domiciled in Delaware, Hippo sells homeowners, Hippo+,
  auto, flood, pet, landlord, and fire insurance through a network of more
  than 70 carrier partners, including its in-house carrier Spinnaker
  Insurance Company. The company serves more than 500,000 homeowners
  across all 50 states and pairs policies with the Hippo Home app, which
  offers home maintenance checklists, seasonal guidance, and a home care
  score to encourage proactive home upkeep. Hippo Holdings also operates
  First Connect Insurance Services, an independent-agent platform, and
  Spinnaker Specialty Insurance Company and Mainsail Insurance Company.
  Hippo does not publish a public developer portal, partner API, or SDK;
  there is no documented public REST API, OpenAPI specification, or
  open-source GitHub presence (the `hippoinsurance` GitHub organization
  exists but is empty).
